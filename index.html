<html lang="es">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <style>
        body { font-family: 'Fira Sans', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }
        .tip-card { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

 </head>
 <body data-template-id="__page-root" class="min-h-screen bg-gray-950 text-gray-100">
  <header class="relative overflow-hidden" style="min-height: calc(70 * min(var(--vh, 1vh), 1vh))"><img data-template-id="hero-img" class="canva-image absolute inset-0 w-full h-full object-cover opacity-40" loading="lazy">
   <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-gray-950"></div>
   <div class="relative z-10 flex flex-col items-center justify-center text-center px-6 py-20" style="min-height: calc(70 * min(var(--vh, 1vh), 1vh))">
    <h1 data-template-id="main-title" class="canva-text font-display text-5xl md:text-7xl font-black text-red-500 drop-shadow-lg mb-4"></h1>
    <p data-template-id="subtitle" class="canva-text text-xl md:text-2xl text-gray-300 max-w-2xl"></p>
   </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-12"><!-- Categories -->
   <section class="mb-12">
    <h2 data-template-id="categories-heading" class="canva-text font-display text-3xl font-bold text-center mb-8"></h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4"><button onclick="filterCategory('fuego')" class="group relative rounded-xl overflow-hidden aspect-square"> <img data-template-id="cat-fire-img" class="canva-image w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy">
      <div class="absolute inset-0 bg-black/50 group-hover:bg-black/30 transition-colors flex items-center justify-center"><span data-template-id="cat-fire-label" class="canva-text text-lg font-bold text-orange-400"></span>
      </div></button> <button onclick="filterCategory('agua')" class="group relative rounded-xl overflow-hidden aspect-square"> <img data-template-id="cat-water-img" class="canva-image w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy">
      <div class="absolute inset-0 bg-black/50 group-hover:bg-black/30 transition-colors flex items-center justify-center"><span data-template-id="cat-water-label" class="canva-text text-lg font-bold text-blue-400"></span>
      </div></button> <button onclick="filterCategory('naturaleza')" class="group relative rounded-xl overflow-hidden aspect-square"> <img data-template-id="cat-nature-img" class="canva-image w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy">
      <div class="absolute inset-0 bg-black/50 group-hover:bg-black/30 transition-colors flex items-center justify-center"><span data-template-id="cat-nature-label" class="canva-text text-lg font-bold text-green-400"></span>
      </div></button> <button onclick="filterCategory('urbano')" class="group relative rounded-xl overflow-hidden aspect-square"> <img data-template-id="cat-urban-img" class="canva-image w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy">
      <div class="absolute inset-0 bg-black/50 group-hover:bg-black/30 transition-colors flex items-center justify-center"><span data-template-id="cat-urban-label" class="canva-text text-lg font-bold text-yellow-400"></span>
      </div></button>
    </div>
   </section><!-- Search & Filter -->
   <section class="mb-8">
    <div class="flex flex-col sm:flex-row gap-4 items-center">
     <div class="relative flex-1 w-full"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5"></i> <input id="search-input" type="text" class="w-full pl-10 pr-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500" placeholder="Buscar consejo de supervivencia...">
     </div><button onclick="filterCategory('all')" class="px-5 py-3 bg-gray-800 border border-gray-700 rounded-lg hover:bg-gray-700 transition-colors whitespace-nowrap"> <i data-lucide="list" class="inline w-4 h-4 mr-1"></i> Mostrar todos </button>
    </div>
    <p id="results-count" class="text-gray-500 text-sm mt-3"></p>
   </section><!-- Tips List -->
   <div id="tips-container" class="grid gap-3"></div>
   <div class="text-center mt-8"><button id="load-more-btn" onclick="loadMore()" class="px-8 py-3 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors"> Cargar más consejos </button>
   </div>
  </main>
  <footer class="text-center py-8 border-t border-gray-800">
   <p data-template-id="footer-text" class="canva-text text-gray-500 text-sm"></p>
  </footer>
  <script src="/_sdk/editing_sdk.js"></script>
  <script>
        const tips = [
            {cat:"fuego",title:"Incendio en casa",tip:"Instala detectores de humo y ten un extintor accesible."},
            {cat:"fuego",title:"Ropa en llamas",tip:"Detente, tírate al suelo y rueda para apagar el fuego."},
            {cat:"fuego",title:"Sartén en llamas",tip:"Nunca uses agua. Tapa la sartén o usa sal/bicarbonato."},
            {cat:"fuego",title:"Incendio forestal",tip:"Evacúa en dirección perpendicular al viento."},
            {cat:"fuego",title:"Explosión de gas",tip:"Si hueles gas, no enciendas nada. Abre ventanas y sal."},
            {cat:"agua",title:"Ahogamiento en piscina",tip:"Aprende RCP y nunca nades solo."},
            {cat:"agua",title:"Corriente de resaca",tip:"Nada paralelo a la costa, nunca contra la corriente."},
            {cat:"agua",title:"Inundación repentina",tip:"Sube a terreno alto. Nunca camines en agua en movimiento."},
            {cat:"agua",title:"Hipotermia en agua fría",tip:"Adopta posición fetal para conservar calor."},
            {cat:"agua",title:"Caída en hielo",tip:"Extiende brazos y patalea para salir horizontalmente."},
            {cat:"naturaleza",title:"Picadura de serpiente",tip:"Inmoviliza la extremidad y busca ayuda médica. No succiones."},
            {cat:"naturaleza",title:"Ataque de oso",tip:"Oso pardo: hazte el muerto. Oso negro: pelea."},
            {cat:"naturaleza",title:"Rayo/tormenta eléctrica",tip:"Agáchate lejos de árboles y objetos metálicos."},
            {cat:"naturaleza",title:"Terremoto",tip:"Cúbrete bajo mesa resistente. Aléjate de ventanas."},
            {cat:"naturaleza",title:"Avalancha",tip:"Nada hacia la superficie. Crea espacio para respirar."},
            {cat:"urbano",title:"Atropello peatonal",tip:"Cruza en pasos señalizados. Mira antes de cruzar."},
            {cat:"urbano",title:"Electrocución doméstica",tip:"Nunca toques aparatos eléctricos con manos mojadas."},
            {cat:"urbano",title:"Caída de altura",tip:"Usa arnés en trabajos elevados. Revisa barandillas."},
            {cat:"urbano",title:"Intoxicación por monóxido",tip:"Instala detector de CO. Ventila calentadores."},
            {cat:"urbano",title:"Atragantamiento",tip:"Aprende la maniobra de Heimlich."},
            {cat:"fuego",title:"Quemadura química",tip:"Lava con agua abundante durante 20 min mínimo."},
            {cat:"fuego",title:"Incendio en edificio alto",tip:"Baja por escaleras, nunca por ascensor. Toca puertas antes de abrir."},
            {cat:"fuego",title:"Humo tóxico",tip:"Arrástrate por el suelo donde hay menos humo."},
            {cat:"agua",title:"Tsunami",tip:"Sube a terreno alto inmediatamente si el mar retrocede."},
            {cat:"agua",title:"Naufragio",tip:"Quédate con el bote volcado. Es más visible que tú."},
            {cat:"naturaleza",title:"Golpe de calor",tip:"Busca sombra, hidratación y enfría el cuerpo con agua."},
            {cat:"naturaleza",title:"Congelación",tip:"Calienta gradualmente. Nunca frotes la zona afectada."},
            {cat:"naturaleza",title:"Erupción volcánica",tip:"Aléjate de valles. Cubre boca y nariz con tela húmeda."},
            {cat:"urbano",title:"Escape de gas en metro",tip:"Cubre nariz, agáchate y sigue las señales de evacuación."},
            {cat:"urbano",title:"Derrumbe de estructura",tip:"Protege cabeza. Si quedas atrapado, golpea tuberías para señalar."},
            {cat:"fuego",title:"Fuegos artificiales",tip:"Mantén distancia. Nunca reenciendas uno fallido."},
            {cat:"agua",title:"Buceo: descompresión",tip:"Sube lentamente. Respeta las paradas de seguridad."},
            {cat:"naturaleza",title:"Picadura de medusa",tip:"Enjuaga con vinagre. Nunca con agua dulce."},
            {cat:"naturaleza",title:"Ataque de tiburón",tip:"Golpea ojos y branquias. No chapotees."},
            {cat:"urbano",title:"Accidente de auto",tip:"Usa cinturón siempre. Posición correcta del reposacabezas."},
            {cat:"urbano",title:"Apuñalamiento",tip:"No retires el objeto. Presiona alrededor y llama emergencias."},
            {cat:"fuego",title:"Quemadura solar severa",tip:"Hidrata con aloe vera. Busca atención si hay ampollas grandes."},
            {cat:"agua",title:"Caída desde puente al agua",tip:"Entra de pies con cuerpo recto para reducir impacto."},
            {cat:"naturaleza",title:"Tornado",tip:"Baja al sótano o habitación interior sin ventanas."},
            {cat:"naturaleza",title:"Huracán",tip:"Refuerza ventanas. Almacena agua y provisiones para 72h."},
            {cat:"urbano",title:"Tiroteo activo",tip:"Corre, escóndete, pelea. En ese orden de prioridad."},
            {cat:"urbano",title:"Estampida humana",tip:"Mantén brazos cruzados sobre pecho. Muévete diagonal."},
            {cat:"fuego",title:"Auto en llamas",tip:"Sal inmediatamente y aléjate 30 metros mínimo."},
            {cat:"agua",title:"Rápidos de río",tip:"Flota boca arriba con pies adelante para desviar obstáculos."},
            {cat:"naturaleza",title:"Caída de árbol",tip:"Corre en ángulo de 45° respecto a la dirección de caída."},
            {cat:"urbano",title:"Fuga de productos tóxicos",tip:"Sube pisos altos si es gas pesado. Sella puertas con toallas húmedas."},
            {cat:"fuego",title:"Cortocircuito",tip:"Corta la electricidad desde el interruptor principal."},
            {cat:"agua",title:"Vehículo sumergido",tip:"Abre ventana inmediatamente. No esperes a que se llene."},
            {cat:"naturaleza",title:"Araña venenosa",tip:"Lava la picadura con jabón. Aplica hielo y busca médico."},
            {cat:"urbano",title:"Ascensor atrapado",tip:"No fuerces puertas. Usa botón de emergencia y espera."},
        ];

        let currentFilter = 'all';
        let visibleCount = 20;

        function getFiltered() {
            const q = document.getElementById('search-input').value.toLowerCase();
            return tips.filter(t => {
                const matchCat = currentFilter === 'all' || t.cat === currentFilter;
                const matchSearch = !q || t.title.toLowerCase().includes(q) || t.tip.toLowerCase().includes(q);
                return matchCat && matchSearch;
            });
        }

        function render() {
            const filtered = getFiltered();
            const toShow = filtered.slice(0, visibleCount);
            const container = document.getElementById('tips-container');
            container.innerHTML = '';
            toShow.forEach((t, i) => {
                const colors = {fuego:'border-orange-500 text-orange-400',agua:'border-blue-500 text-blue-400',naturaleza:'border-green-500 text-green-400',urbano:'border-yellow-500 text-yellow-400'};
                const icons = {fuego:'🔥',agua:'💧',naturaleza:'⚡',urbano:'🏙️'};
                const el = document.createElement('div');
                el.className = `tip-card p-4 bg-gray-900 border-l-4 ${colors[t.cat]} rounded-r-lg`;
                el.innerHTML = `<div class="flex items-start gap-3"><span class="text-2xl">${icons[t.cat]}</span><div><h3 class="font-semibold text-gray-100">#${tips.indexOf(t)+1} — ${t.title}</h3><p class="text-gray-400 text-sm mt-1">${t.tip}</p></div></div>`;
                container.appendChild(el);
            });
            document.getElementById('results-count').textContent = `Mostrando ${toShow.length} de ${filtered.length} consejos`;
            document.getElementById('load-more-btn').style.display = visibleCount >= filtered.length ? 'none' : '';
        }

        function filterCategory(cat) { currentFilter = cat; visibleCount = 20; render(); }
        function loadMore() { visibleCount += 20; render(); }

        document.getElementById('search-input').addEventListener('input', () => { visibleCount = 20; render(); });

        render();
        lucide.createIcons();
    </script>
